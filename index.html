<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Stream Console</title>

  <style>
    body {
      margin: 0;
      background: #080808;
      color: white;
      font-family: Arial, sans-serif;
      padding: 16px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    .court-card {
      background: #151515;
      border: 1px solid #2c2c2c;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .light {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: gray;
    }

    .good { background: #00ff66; }
    .stopped { background: red; }
    .lagging { background: orange; }

    .info {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }

    .buttons {
      margin-top: 12px;
      display: flex;
      gap: 6px;
    }

    button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
    }

    .start { background: green; }
    .stop { background: red; }
    .restart { background: orange; }
  </style>
</head>

<body>

<h1>Master Stream Console</h1>

<div id="courts"></div>

<script>
const DB = "https://master-stream-console-default-rtdb.europe-west1.firebasedatabase.app";
const container = document.getElementById("courts");

// create UI
for (let i = 1; i <= 8; i++) {
  container.innerHTML += `
    <div class="court-card">
      <div class="title">
        <div id="light-${i}" class="light"></div>
        Court ${i}
      </div>

      <div class="info">
        Status: <span id="status-${i}">-</span><br>
        Health: <span id="health-${i}">-</span>
      </div>

      <div class="buttons">
        <button class="start" onclick="cmd(${i}, 'start')">Start</button>
        <button class="stop" onclick="cmd(${i}, 'stop')">Stop</button>
        <button class="restart" onclick="cmd(${i}, 'restart')">Restart</button>
      </div>
    </div>
  `;
}

// send command
async function cmd(court, action) {
  await fetch(`${DB}/commands/court${court}/action.json`, {
    method: "PUT",
    body: JSON.stringify(action)
  });
}

// load status
async function update() {
  for (let i = 1; i <= 8; i++) {
    try {
      const res = await fetch(`${DB}/status/court${i}.json`);
      const data = await res.json();

      const status = data?.status || "stopped";
      const health = data?.health || "unknown";

      document.getElementById(`status-${i}`).innerText = status;
      document.getElementById(`health-${i}`).innerText = health;

      const light = document.getElementById(`light-${i}`);
      light.className = "light";

      if (status === "stopped") {
        light.classList.add("stopped");
      } else if (health === "good") {
        light.classList.add("good");
      } else {
        light.classList.add("lagging");
      }

    } catch (e) {
      document.getElementById(`status-${i}`).innerText = "error";
    }
  }
}

setInterval(update, 2000);
update();
</script>

</body>
</html>
